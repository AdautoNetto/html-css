<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border-width: 10px;
            border-style: solid;
            border-color: darkgray;
            
            border: 10px solid darkgray;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            padding: 10px 10px 10px 10px;

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 10px;

            margin: 10px;

            margin: auto;

            outline-width: 2px;
            outline-style: dashed;
            outline-color: salmon;

            outline: 3px dashed salmon ;
        }

        a {
            border-width: 2px;
            border-style: dashed;
            border-color: darkblue;

            border: 4px solid red ;

            padding: 5px;

            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo  de caixa Box-Level</h1>
    <p>paragráfos também são exemplos de box-level, mas os <a href="#">Links são exemplos de box-inline</a></p>
</body>
</html>
