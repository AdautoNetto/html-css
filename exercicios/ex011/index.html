<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
        <H1>Imagem dinâmica</H1>
        <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>
        <hr>

        <picture>
            <source media="(max-width:740px)" srcset="imagens/p.png" type="image/png">
            <source media="(max-width:1040px )" srcset="imagens/m.png" type="image/png">
            <img src="imagens/g.png" alt="Imagem Flexivel">
        </picture>
        <h1>Reproduzindo audios</h1>
        <p>vamos aprender a reproduzir audios em HTML5</p>
        <audio preload="metadata" controls loop>
            <source src="midias/audio.mp3" type="audio/mpeg">
            <source src="midias/audio.ogg" type="audio/ogg">
            <source src="midias/audio.wav" type="audio/wav">
            <p>infelizemente o seu navegador nao aceita os tipos de arquivos <a href="midias/audio.mp3">Clique aqui para baixar o arquivo MP3</a> </p>
        </audio>
</body>
</html>
