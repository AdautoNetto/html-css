<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Esse video estpa hospedado em meu proprio servidor</p>
    <hr>
    <video controls width="350px" poster="imagens/foto perfil inteira.png" autoplay loop>
            <source src="midia/video02.ogv" type="video/ogg">
            <source src="midia/Video02.mkv" type="video/mkv">
            <source src="midia/Video02.mp4" type="video/mp4">
            <source src="midia/Video02.webm" type="video/webm">
            <p>O seu Navegador nao tem compatibilidade com a reprodução dos videos desse site</p>
    </video>
    <hr>
    <h1>Inserindo videos do youtube</h1>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/56mu8KSUYqk?si=s3-omEIiZHpql6oQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
