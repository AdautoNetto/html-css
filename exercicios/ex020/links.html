<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        a:visited {
            color: darkred;
        }

        a:active {
            color: yellow;
        }

        a:hover {
            text-decoration: underline;
            color: blue
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
            
        }

        a::after {
            text-decoration: none ;
            font-weight: normal;
            color: darkgray;
        }

        .especial::before {
            content: '→  ';
        }

        .especial::after {
            content: '  ←';
        }
        
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/AdautoNetto">Repositório Git Hub</a></li>
        <li><a href="https://www.youtube.com/@dautin05" class="especial">Canal do Youtube</a></li>
        <li><a href="https://www.instagram.com/dautinn/">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
