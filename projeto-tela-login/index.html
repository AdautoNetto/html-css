<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem vindo(a) novamente. Faça login para acessar a sua conta e poder fazer as configurações</p>
                <form action="login.php" method="post">
                
                <div class="login">
                    <label for="email" class="material-symbols-outlined" >person</label>
                    <input type="email" id="email" placeholder="E-mail" required size="20">
                </div>

                <div class="login">
                    <label for="senha" class="material-symbols-outlined">key</label>
                    <input type="password" name="senha" id="senha" placeholder="Senha" required size="20" minlength="4">
                </div>

                <div id="enviar">
                    <input type="submit" value="Entrar">
                </div>

                <div id="esqueci">
                    <a href="esqueci.html">Esqueci a senha</a>
                </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
